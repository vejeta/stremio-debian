name: Build CEF Packages

on:
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild (re-download orig tarballs even if cached)'
        required: false
        default: false
        type: boolean

permissions:
  contents: write

env:
  DEBIAN_FRONTEND: noninteractive
  DEBEMAIL: "vejeta@gmail.com"
  DEBFULLNAME: "Juan Manuel Mendez Rey"

jobs:
  build-cef:
    name: Build CEF - sid amd64
    # CRITICAL: Must run on self-hosted runner with appropriate resources
    # Required labels: self-hosted, linux, x64, cef-builder
    runs-on: [self-hosted, linux, x64, cef-builder]
    timeout-minutes: 1440  # 24 hours max

    outputs:
      upstream_version: ${{ steps.versions.outputs.upstream_version }}
      full_version: ${{ steps.versions.outputs.full_version }}
      cef_soname: ${{ steps.versions.outputs.cef_soname }}

    steps:
      - name: Verify runner capabilities
        run: |
          echo "=== Runner Verification ==="
          echo "Hostname: $(hostname)"
          echo "CPU cores: $(nproc)"
          echo "RAM: $(free -h | grep Mem | awk '{print $2}')"
          echo "Disk space: $(df -h / | tail -1 | awk '{print $4}')"

          CORES=$(nproc)
          RAM_GB=$(free -g | grep Mem | awk '{print $2}')
          DISK_GB=$(df -BG / | tail -1 | awk '{print $4}' | tr -d 'G')

          if [ "$CORES" -lt 4 ]; then
            echo "ERROR: Need at least 4 CPU cores (have $CORES)"
            exit 1
          fi

          if [ "$RAM_GB" -lt 8 ]; then
            echo "ERROR: Need at least 8GB RAM (have ${RAM_GB}GB)"
            exit 1
          fi

          if [ "$DISK_GB" -lt 40 ]; then
            echo "ERROR: Need at least 40GB disk (have ${DISK_GB}GB)"
            exit 1
          fi

          for cmd in sbuild dpkg-parsechangelog dpkg-source; do
            if ! command -v $cmd &>/dev/null; then
              echo "ERROR: $cmd is not installed"
              exit 1
            fi
          done

          echo "sbuild: $(sbuild --version 2>&1 | head -1)"
          echo "Runner meets requirements"

      - name: Clone or update chromium source (cef branch)
        run: |
          git config --global user.email "$DEBEMAIL"
          git config --global user.name "$DEBFULLNAME"
          git config --global --add safe.directory '*'

          if [ -d "chromium" ]; then
            echo "Updating existing chromium repo..."
            cd chromium
            git fetch origin cef
            git checkout cef
            git reset --hard origin/cef
            cd ..
          else
            echo "Cloning chromium repo (cef branch)..."
            git clone --branch cef --single-branch \
              https://salsa.debian.org/mendezr/chromium.git
          fi

      - name: Determine versions
        id: versions
        run: |
          UPVER=$(dpkg-parsechangelog -l chromium/debian/changelog -S Version | sed 's/-.*//')
          FULLVER=$(dpkg-parsechangelog -l chromium/debian/changelog -S Version)
          CEF_SONAME=$(echo "$UPVER" | cut -d. -f1)

          echo "Chromium upstream version: $UPVER"
          echo "Full package version: $FULLVER"
          echo "CEF soname: libcef$CEF_SONAME"

          echo "upstream_version=$UPVER" >> "$GITHUB_OUTPUT"
          echo "full_version=$FULLVER" >> "$GITHUB_OUTPUT"
          echo "cef_soname=$CEF_SONAME" >> "$GITHUB_OUTPUT"

      - name: Clean old build artifacts
        run: |
          # Self-hosted runners persist workspace; clean stale artifacts
          UPVER="${{ steps.versions.outputs.upstream_version }}"
          rm -f chromium_*.dsc chromium_*.debian.tar.xz
          rm -f libcef*.deb chromium_*_*.buildinfo chromium_*_*.changes
          rm -rf tmp/dsc-build artifacts

          # Remove tarballs from other versions (keep current if cached)
          for f in chromium_*.orig*.tar.xz; do
            [ -f "$f" ] || continue
            case "$f" in
              chromium_${UPVER}.orig*.tar.xz) ;; # keep current version
              *) echo "Removing old tarball: $f"; rm -f "$f" ;;
            esac
          done

      - name: Obtain orig tarballs
        run: |
          UPVER="${{ steps.versions.outputs.upstream_version }}"
          cd chromium

          # Chromium source tarball (~860MB, repackaged from upstream)
          if [ -f "../chromium_${UPVER}.orig.tar.xz" ] && [ "${{ inputs.force_rebuild }}" != "true" ]; then
            echo "Chromium source tarball already cached"
            ls -lh "../chromium_${UPVER}.orig.tar.xz"
          else
            echo "==> Downloading and repackaging Chromium source tarball (this takes a while)"
            rm -f "../chromium_${UPVER}.orig.tar.xz"
            make -f debian/rules get-orig-source
          fi

          # CEF component tarball (~1.9MB, cloned from Bitbucket)
          if [ -f "../chromium_${UPVER}.orig-cef.tar.xz" ] && [ "${{ inputs.force_rebuild }}" != "true" ]; then
            echo "CEF component tarball already cached"
            ls -lh "../chromium_${UPVER}.orig-cef.tar.xz"
          else
            echo "==> Creating CEF component tarball"
            rm -f "../chromium_${UPVER}.orig-cef.tar.xz"
            make -f debian/rules get-cef-source
          fi

          cd ..
          echo "=== Orig tarballs ==="
          ls -lh chromium_${UPVER}.orig*.tar.xz

      - name: Build source package (.dsc)
        run: |
          UPVER="${{ steps.versions.outputs.upstream_version }}"
          FULLVER="${{ steps.versions.outputs.full_version }}"

          # Must use clean extraction, not git working tree
          rm -rf tmp/dsc-build
          mkdir -p tmp/dsc-build

          echo "==> Extracting Chromium source tarball"
          tar xf "chromium_${UPVER}.orig.tar.xz" -C tmp/dsc-build

          echo "==> Extracting CEF component tarball"
          tar xf "chromium_${UPVER}.orig-cef.tar.xz" -C tmp/dsc-build

          ln -sf "$PWD/chromium_${UPVER}.orig.tar.xz" tmp/dsc-build/
          ln -sf "$PWD/chromium_${UPVER}.orig-cef.tar.xz" tmp/dsc-build/

          echo "==> Copying debian directory"
          cp -a chromium/debian "tmp/dsc-build/chromium-${UPVER}/debian"

          echo "==> Building .dsc"
          cd "tmp/dsc-build/chromium-${UPVER}" && dpkg-source -b .
          cd "$GITHUB_WORKSPACE"

          cp "tmp/dsc-build/chromium_${FULLVER}.dsc" .
          cp "tmp/dsc-build/chromium_${FULLVER}.debian.tar.xz" .
          rm -rf tmp/dsc-build

          echo "=== Source package ==="
          ls -lh "chromium_${FULLVER}."*

      - name: Build CEF packages with sbuild
        run: |
          FULLVER="${{ steps.versions.outputs.full_version }}"
          mkdir -p tmp

          echo "==> Building CEF packages with sbuild (amd64, this will take hours)"
          sbuild --arch=amd64 --dist=unstable \
            --chroot-mode=unshare \
            --build-dep-resolver=apt --verbose \
            --profiles=pkg.chromium.cef \
            "chromium_${FULLVER}.dsc" \
            2>&1 | tee "tmp/sbuild-chromium-cef-amd64-$(date +%Y%m%d-%H%M).log"

      - name: Run lintian checks
        continue-on-error: true
        run: lintian --info --display-info --pedantic libcef*.deb || true

      - name: Collect build artifacts
        run: |
          mkdir -p artifacts/cef-sid-amd64

          # sbuild produces .deb files in the current directory
          for deb in libcef*.deb; do
            if [ -f "$deb" ]; then
              filename=$(basename "$deb")
              # Add distro suffix for consistency with other packages
              newname="${filename%.deb}-sid.deb"
              mv "$deb" "artifacts/cef-sid-amd64/$newname"
            fi
          done

          # Move other build artifacts
          mv *.buildinfo artifacts/cef-sid-amd64/ 2>/dev/null || true
          mv *.changes artifacts/cef-sid-amd64/ 2>/dev/null || true

          echo "=== Collected artifacts ==="
          ls -lah artifacts/cef-sid-amd64/

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cef-packages-sid-amd64
          path: artifacts/cef-sid-amd64/*.deb
          retention-days: 90

      - name: Upload all artifacts
        uses: actions/upload-artifact@v7
        with:
          name: cef-all-sid-amd64
          path: artifacts/cef-sid-amd64/*
          retention-days: 90

  create-cef-release:
    name: Create CEF Release
    needs: [build-cef]
    runs-on: ubuntu-latest

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v8
        with:
          path: release-artifacts

      - name: Display artifacts
        run: ls -R release-artifacts

      - name: Create release notes
        run: |
          CEF_SONAME="${{ needs.build-cef.outputs.cef_soname }}"
          CHROMIUM_VERSION="${{ needs.build-cef.outputs.upstream_version }}"
          FULL_VERSION="${{ needs.build-cef.outputs.full_version }}"
          BUILD_DATE="$(date -u +"%Y-%m-%d %H:%M UTC")"

          cat > RELEASE_NOTES.md << EOF
          # Chromium Embedded Framework (libcef${CEF_SONAME})

          Built from Chromium ${CHROMIUM_VERSION} source package (${FULL_VERSION}) with CEF build profile.

          ## Packages

          - **libcef${CEF_SONAME}** - CEF runtime library
          - **libcef${CEF_SONAME}-dbgsym** - Debug symbols
          - **libcef-dev** - Development headers, CMake config, pkg-config
          - **libcef-common** - Required runtime resources (locales, PAK files)

          ## Installation

          Available in the APT repository for Debian sid:

          \`\`\`bash
          wget -qO - https://debian.vejeta.com/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/stremio-debian.gpg
          echo "deb [signed-by=/usr/share/keyrings/stremio-debian.gpg] https://debian.vejeta.com sid main non-free" | sudo tee /etc/apt/sources.list.d/stremio.list
          sudo apt update
          sudo apt install libcef${CEF_SONAME} libcef-common
          \`\`\`

          ## Build Information

          - Built on: ${BUILD_DATE}
          - Source: chromium ${CHROMIUM_VERSION} (cef branch)
          - Distribution: Debian sid (unstable)
          - Architecture: amd64
          - Build method: sbuild --profiles=pkg.chromium.cef

          ## License

          CEF is distributed in the \`main\` component (BSD-3-Clause).
          EOF

          cat RELEASE_NOTES.md

      - name: Delete existing release assets if rebuilding
        run: |
          CHROMIUM_VERSION="${{ needs.build-cef.outputs.upstream_version }}"
          TAG="cef-${CHROMIUM_VERSION}"
          REPO="${{ github.repository }}"
          # Delete all assets by ID via API (avoids filename encoding issues)
          RELEASE_ID=$(gh api "repos/$REPO/releases/tags/$TAG" --jq '.id' 2>/dev/null) || true
          if [ -n "$RELEASE_ID" ]; then
            gh api "repos/$REPO/releases/$RELEASE_ID/assets" --jq '.[].id' | while read -r asset_id; do
              echo "Deleting asset ID: $asset_id"
              gh api -X DELETE "repos/$REPO/releases/assets/$asset_id"
            done
            echo "All existing assets deleted"
          else
            echo "No existing release found for $TAG"
          fi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: cef-${{ needs.build-cef.outputs.upstream_version }}
          name: CEF ${{ needs.build-cef.outputs.cef_soname }} (Chromium ${{ needs.build-cef.outputs.upstream_version }})
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: true
          files: |
            release-artifacts/cef-packages-*/*.deb
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trigger repository update
        uses: peter-evans/repository-dispatch@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          event-type: cef-packages-updated
          client-payload: '{"version": "${{ needs.build-cef.outputs.upstream_version }}"}'
