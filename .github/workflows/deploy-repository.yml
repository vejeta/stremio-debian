          EOF

          # Update build date
          sed -i "s/BUILD_DATE/$(date -u +"%Y-%m-%d %H:%M UTC")/" debian-repo/index.html

          # Substitute the derived CEF/Chromium version into the page
          sed -i "s/__CEF_SONAME__/$CEF_SONAME/g; s/__CHROMIUM_VERSION__/$CHROMIUM_VERSION/g" debian-repo/index.html

          # Emit a shields.io endpoint badge source so README/badges auto-update on every deploy
          cat > debian-repo/version.json << JSON
          {"schemaVersion":1,"label":"chromium (cef)","message":"$CHROMIUM_VERSION","color":"blue"}
          JSON
          echo "Wrote version.json: $(cat debian-repo/version.json)"

      - name: Display repository structure
        run: |
          echo "=== Repository Structure ==="
          tree -L 4 debian-repo || find debian-repo -type f | sort

      - name: Setup Pages
        uses: actions/configure-pages@v6

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: debian-repo

  deploy:
    name: Deploy to GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build-repository

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Deployment summary
        run: |
          echo "✅ Repository deployed successfully!"
          echo "URL: ${{ steps.deployment.outputs.page_url }}"
          echo ""
          echo "Custom domain: https://debian.vejeta.com"
          echo ""
          echo "=== Supported Distributions ==="
          echo "📦 Debian testing - rolling (use if you have both trixie + testing sources)"
          echo "📦 Debian 13 (trixie) - current stable (use if you only have trixie sources)"
          echo "📦 Debian 12 (bookworm) - previous stable"
          echo "📦 Debian sid (unstable) - rolling release (Kali compatible)"
          echo "📦 Ubuntu 24.04 LTS (noble) - EXPERIMENTAL"
          echo "📦 Ubuntu 25.04 (plucky) - EXPERIMENTAL (stremio-qt6)"
          echo ""
          echo "Users can add the repository with:"
          echo ""
          echo "For testing:"
          echo "  sudo mkdir -p /etc/apt/keyrings"
          echo "  wget -qO - https://debian.vejeta.com/key.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/stremio-debian.gpg"
          echo "  echo \"deb [signed-by=/etc/apt/keyrings/stremio-debian.gpg] https://debian.vejeta.com testing main non-free\" | sudo tee /etc/apt/sources.list.d/stremio.list"
          echo ""
          echo "For trixie:"
          echo "  echo \"deb [signed-by=/etc/apt/keyrings/stremio-debian.gpg] https://debian.vejeta.com trixie main non-free\" | sudo tee /etc/apt/sources.list.d/stremio.list"
          echo ""
          echo "For bookworm:"
