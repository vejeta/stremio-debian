name: Deploy APT Repository to GitHub Pages

on:
  repository_dispatch:
    types: [packages-updated, cef-packages-updated, gtk-packages-updated, qt6-packages-updated]
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: 'Force rebuild of entire repository'
        required: false
        default: 'false'
        type: boolean
  push:
    branches:
      - main
    paths:
      - 'repository-scripts/**'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-repository:
    name: Build APT Repository
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Install repository tools
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev gnupg tree

      - name: Download latest release packages
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Create directory structure for each distribution
          mkdir -p packages/{testing,trixie,bookworm,sid,noble,plucky}/{main,non-free}

          # Download from latest v* release (stremio-qt5 and stremio-server)
          # Note: We specifically look for v* tags, not "Latest" which could be gtk-* or cef-*
          LATEST_TAG=$(gh release list --limit 20 --json tagName -q '.[].tagName' | grep "^v" | head -1)

          if [ -n "$LATEST_TAG" ]; then
            echo "Downloading packages from release: $LATEST_TAG"

            # Download all .deb packages from the latest release
            mkdir -p temp-downloads
            gh release download "$LATEST_TAG" --pattern "*.deb" --dir temp-downloads/

            # Organize packages by distribution and component
            # Package naming format: stremio_4.4.169+dfsg-1_amd64-trixie.deb
            echo "=== Organizing packages by distribution ==="

            for deb in temp-downloads/*.deb; do
              if [ ! -f "$deb" ]; then continue; fi

              filename=$(basename "$deb")
              echo "Processing: $filename"

              # Extract distribution from filename (last part before .deb)
              # stremio_4.4.169+dfsg-1_amd64-trixie.deb -> trixie
              if [[ "$filename" =~ -([a-z]+)\.deb$ ]]; then
                distro="${BASH_REMATCH[1]}"
                echo "  Detected distribution: $distro"

                # Remove distro suffix from filename for APT repository
                # stremio_4.4.169+dfsg-1_amd64-trixie.deb -> stremio_4.4.169+dfsg-1_amd64.deb
                clean_filename="${filename%-${distro}.deb}.deb"

                # Determine component (main or non-free)
                # non-free: stremio-server only
                # main: stremio, stremio-gtk, libcef*, libcef-common
                if [[ "$filename" =~ ^stremio-server ]]; then
                  component="non-free"
                else
                  component="main"
                fi

                echo "  Component: $component"
                echo "  Clean filename: $clean_filename"

                # Copy to appropriate directory with clean filename
                cp "$deb" "packages/$distro/$component/$clean_filename"
              else
                echo "  Warning: Could not extract distribution from filename"
              fi
            done

            echo ""
            echo "=== Organized packages ==="
            for distro in testing trixie bookworm sid noble plucky; do
              echo "Distribution: $distro"
              echo "  main:"
              ls -lh packages/$distro/main/ 2>/dev/null || echo "    (empty)"
              echo "  non-free:"
              ls -lh packages/$distro/non-free/ 2>/dev/null || echo "    (empty)"
            done
          else
            echo "No releases found, creating empty repository structure"
          fi

      - name: Download CEF packages from separate releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find all stable CEF releases (tag format: cef-X.X.X, excludes prereleases)
          # Keep all versions so soname-versioned libcefXXX packages coexist
          CEF_TAGS=$(gh release list --limit 20 --exclude-pre-releases --json tagName -q '.[].tagName' | grep "^cef-" || true)

          if [ -n "$CEF_TAGS" ]; then
            mkdir -p temp-cef-downloads
            for CEF_TAG in $CEF_TAGS; do
              echo "Downloading CEF packages from release: $CEF_TAG"
              gh release download "$CEF_TAG" --pattern "*.deb" --dir temp-cef-downloads/ --clobber || true
            done

            # Move CEF packages to sid/main (CEF only supports sid)
            for deb in temp-cef-downloads/*.deb; do
              if [ -f "$deb" ]; then
                filename=$(basename "$deb")
                echo "Processing CEF package: $filename"

                # Remove -sid suffix if present to get clean filename
                if [[ "$filename" == *-sid.deb ]]; then
                  clean_filename="${filename%-sid.deb}.deb"
                else
                  clean_filename="$filename"
                fi

                # CEF packages go to main
                cp "$deb" "packages/sid/main/$clean_filename"
                echo "  -> packages/sid/main/$clean_filename"
              fi
            done

            echo "=== CEF packages added to sid/main ==="
            ls -lh packages/sid/main/ 2>/dev/null || echo "(empty)"
          else
            echo "No CEF releases found (this is OK if CEF hasn't been built yet)"
          fi

      - name: Download stremio-gtk packages from separate releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find latest stremio-gtk release (tag format: gtk-X.X.X)
          GTK_TAG=$(gh release list --limit 20 --json tagName -q '.[].tagName' | grep "^gtk-" | head -1)

          if [ -n "$GTK_TAG" ]; then
            echo "Downloading stremio-gtk packages from release: $GTK_TAG"
            mkdir -p temp-gtk-downloads
            gh release download "$GTK_TAG" --pattern "*.deb" --dir temp-gtk-downloads/ || true

            # Sort gtk release packages by component
            for deb in temp-gtk-downloads/*.deb; do
              if [ -f "$deb" ]; then
                filename=$(basename "$deb")
                echo "Processing stremio-gtk release package: $filename"

                # Remove -sid suffix if present to get clean filename
                if [[ "$filename" == *-sid.deb ]]; then
                  clean_filename="${filename%-sid.deb}.deb"
                else
                  clean_filename="$filename"
                fi

                # stremio-server is proprietary -> non-free
                # Everything else (stremio-gtk, librust-cef-*) -> main
                if [[ "$filename" =~ ^stremio-server ]]; then
                  component="non-free"
                else
                  component="main"
                fi

                cp "$deb" "packages/sid/$component/$clean_filename"
                echo "  -> packages/sid/$component/$clean_filename"
              fi
            done

            echo "=== stremio-gtk release packages sorted ==="
            echo "main:"
            ls -lh packages/sid/main/ 2>/dev/null || echo "  (empty)"
            echo "non-free:"
            ls -lh packages/sid/non-free/ 2>/dev/null || echo "  (empty)"
          else
            echo "No stremio-gtk releases found (this is OK if stremio-gtk hasn't been built yet)"
          fi

      - name: Download stremio-qt6 packages from separate releases
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          # Find latest stremio-qt6 release (tag format: qt6-X.X.X)
          QT6_TAG=$(gh release list --limit 20 --json tagName -q '.[].tagName' | grep "^qt6-" | head -1)

          if [ -n "$QT6_TAG" ]; then
            echo "Downloading stremio-qt6 packages from release: $QT6_TAG"
            mkdir -p temp-qt6-downloads
            gh release download "$QT6_TAG" --pattern "*.deb" --dir temp-qt6-downloads/ || true

            for deb in temp-qt6-downloads/*.deb; do
              if [ -f "$deb" ]; then
                filename=$(basename "$deb")
                echo "Processing stremio-qt6 release package: $filename"

                # Extract distribution from filename suffix
                if [[ "$filename" =~ -([a-z]+)\.deb$ ]]; then
                  distro="${BASH_REMATCH[1]}"
                  clean_filename="${filename%-${distro}.deb}.deb"

                  # stremio-server -> non-free, everything else -> main
                  if [[ "$filename" =~ ^stremio-server ]]; then
                    component="non-free"
                  else
                    component="main"
                  fi

                  cp "$deb" "packages/$distro/$component/$clean_filename"
                  echo "  -> packages/$distro/$component/$clean_filename"
                else
                  echo "  Warning: Could not extract distribution from filename"
                fi
              fi
            done

            echo "=== stremio-qt6 release packages sorted ==="
            for distro in trixie sid plucky; do
              echo "Distribution: $distro"
              echo "  main:"
              ls -lh packages/$distro/main/stremio-qt6* 2>/dev/null || echo "    (none)"
              echo "  non-free:"
              ls -lh packages/$distro/non-free/stremio-server* 2>/dev/null || echo "    (none)"
            done
          else
            echo "No stremio-qt6 releases found (this is OK if stremio-qt6 hasn't been built yet)"
          fi

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_PRIVATE_KEY }}" | gpg --batch --import
          gpg --list-secret-keys --keyid-format=long

      - name: Generate APT repositories for all distributions
        run: |
          chmod +x repository-scripts/*.sh

          echo "=== Generating repository for Debian testing (rolling) ==="
          ./repository-scripts/generate-apt-repo.sh packages/testing/main debian-repo testing main amd64
          ./repository-scripts/generate-apt-repo.sh packages/testing/main debian-repo testing main arm64
          ./repository-scripts/generate-apt-repo.sh packages/testing/non-free debian-repo testing non-free amd64
          ./repository-scripts/generate-apt-repo.sh packages/testing/non-free debian-repo testing non-free arm64

          echo "=== Generating repository for Debian 13 (trixie - stable) ==="
          ./repository-scripts/generate-apt-repo.sh packages/trixie/main debian-repo trixie main amd64
          ./repository-scripts/generate-apt-repo.sh packages/trixie/main debian-repo trixie main arm64
          ./repository-scripts/generate-apt-repo.sh packages/trixie/non-free debian-repo trixie non-free amd64
          ./repository-scripts/generate-apt-repo.sh packages/trixie/non-free debian-repo trixie non-free arm64

          echo "=== Generating repository for Debian 12 (bookworm - oldstable) ==="
          ./repository-scripts/generate-apt-repo.sh packages/bookworm/main debian-repo bookworm main amd64
          ./repository-scripts/generate-apt-repo.sh packages/bookworm/main debian-repo bookworm main arm64
          ./repository-scripts/generate-apt-repo.sh packages/bookworm/non-free debian-repo bookworm non-free amd64
          ./repository-scripts/generate-apt-repo.sh packages/bookworm/non-free debian-repo bookworm non-free arm64

          echo "=== Generating repository for Debian sid (unstable) ==="
          ./repository-scripts/generate-apt-repo.sh packages/sid/main debian-repo sid main amd64
          ./repository-scripts/generate-apt-repo.sh packages/sid/main debian-repo sid main arm64
          ./repository-scripts/generate-apt-repo.sh packages/sid/non-free debian-repo sid non-free amd64
          ./repository-scripts/generate-apt-repo.sh packages/sid/non-free debian-repo sid non-free arm64

          echo "=== Generating repository for Ubuntu 24.04 (noble - LTS) - EXPERIMENTAL ==="
          ./repository-scripts/generate-apt-repo.sh packages/noble/main debian-repo noble main amd64
          ./repository-scripts/generate-apt-repo.sh packages/noble/main debian-repo noble main arm64
          ./repository-scripts/generate-apt-repo.sh packages/noble/non-free debian-repo noble non-free amd64
          ./repository-scripts/generate-apt-repo.sh packages/noble/non-free debian-repo noble non-free arm64

          echo "=== Generating repository for Ubuntu 25.04 (plucky) - EXPERIMENTAL ==="
          ./repository-scripts/generate-apt-repo.sh packages/plucky/main debian-repo plucky main amd64
          ./repository-scripts/generate-apt-repo.sh packages/plucky/main debian-repo plucky main arm64
          ./repository-scripts/generate-apt-repo.sh packages/plucky/non-free debian-repo plucky non-free amd64
          ./repository-scripts/generate-apt-repo.sh packages/plucky/non-free debian-repo plucky non-free arm64

      - name: Create empty non-free-firmware components
        run: |
          # Debian 12+ expects non-free-firmware component
          # Create empty Packages files to match Release file declaration
          for distro in testing trixie bookworm sid noble plucky; do
            echo "Creating empty non-free-firmware for $distro"

            # Create for both amd64 and arm64
            for arch in amd64 arm64; do
              mkdir -p debian-repo/dists/$distro/non-free-firmware/binary-$arch

              # Create empty Packages file
              touch debian-repo/dists/$distro/non-free-firmware/binary-$arch/Packages

              # Compress it
              gzip -k -f debian-repo/dists/$distro/non-free-firmware/binary-$arch/Packages
            done
          done

      - name: Update Release files for all distributions
        run: |
          cd debian-repo

          # Function to update Release file for a distribution
          update_release() {
            local SUITE=$1
            echo "=== Updating Release file for $SUITE ==="

            # Debian 12+ uses split non-free components (non-free + non-free-firmware)
            # List both even though we only use non-free, to suppress APT notices
            cat > dists/$SUITE/Release << EOF
          Origin: Stremio Debian Repository
          Label: Stremio
          Suite: $SUITE
          Codename: $SUITE
          Components: main non-free non-free-firmware
          Architectures: amd64 arm64
          Description: Unofficial Debian packages for Stremio media center ($SUITE)
          Date: $(date -R -u)
          EOF

            # Add checksums
            echo "MD5Sum:" >> dists/$SUITE/Release
            find dists/$SUITE -type f ! -name "Release*" | while read file; do
                relative_path="${file#dists/$SUITE/}"
                md5=$(md5sum "$file" | awk '{print $1}')
                size=$(stat -c%s "$file")
                printf " %s %8d %s\n" "$md5" "$size" "$relative_path" >> dists/$SUITE/Release
            done

            echo "SHA1:" >> dists/$SUITE/Release
            find dists/$SUITE -type f ! -name "Release*" | while read file; do
                relative_path="${file#dists/$SUITE/}"
                sha1=$(sha1sum "$file" | awk '{print $1}')
                size=$(stat -c%s "$file")
                printf " %s %8d %s\n" "$sha1" "$size" "$relative_path" >> dists/$SUITE/Release
            done

            echo "SHA256:" >> dists/$SUITE/Release
            find dists/$SUITE -type f ! -name "Release*" | while read file; do
                relative_path="${file#dists/$SUITE/}"
                sha256=$(sha256sum "$file" | awk '{print $1}')
                size=$(stat -c%s "$file")
                printf " %s %8d %s\n" "$sha256" "$size" "$relative_path" >> dists/$SUITE/Release
            done
          }

          # Update all distributions
          update_release testing
          update_release trixie
          update_release bookworm
          update_release sid
          update_release noble
          update_release plucky

          cd ..

      - name: Sign repositories for all distributions
        run: |
          echo "=== Signing testing repository ==="
          ./repository-scripts/sign-repository.sh debian-repo testing "${{ secrets.GPG_KEY_ID }}"

          echo "=== Signing trixie repository ==="
          ./repository-scripts/sign-repository.sh debian-repo trixie "${{ secrets.GPG_KEY_ID }}"

          echo "=== Signing bookworm repository ==="
          ./repository-scripts/sign-repository.sh debian-repo bookworm "${{ secrets.GPG_KEY_ID }}"

          echo "=== Signing sid repository ==="
          ./repository-scripts/sign-repository.sh debian-repo sid "${{ secrets.GPG_KEY_ID }}"

          echo "=== Signing noble repository ==="
          ./repository-scripts/sign-repository.sh debian-repo noble "${{ secrets.GPG_KEY_ID }}"

          echo "=== Signing plucky repository ==="
          ./repository-scripts/sign-repository.sh debian-repo plucky "${{ secrets.GPG_KEY_ID }}"

      - name: Export GPG public key
        run: |
          gpg --armor --export "${{ secrets.GPG_KEY_ID }}" > debian-repo/key.gpg
          echo "GPG key exported to key.gpg"

      - name: Validate repository structure
        run: |
          echo "=== Running automated repository validation ==="
          chmod +x ./repository-scripts/validate-repository.sh
          ./repository-scripts/validate-repository.sh debian-repo

      - name: Create repository index page
        run: |
          cat > debian-repo/index.html << 'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head>
              <meta charset="UTF-8">
              <meta name="viewport" content="width=device-width, initial-scale=1.0">
              <title>Stremio Debian Repository</title>
              <meta name="description" content="Unofficial APT repository for Stremio media center. Debian and Ubuntu packages for amd64 and arm64.">
              <meta property="og:title" content="Stremio Debian Repository">
              <meta property="og:description" content="Unofficial APT repository for Stremio media center. Packages for Debian bookworm, trixie, sid and Ubuntu, built from source following Debian standards.">
              <meta property="og:url" content="https://debian.vejeta.com">
              <meta property="og:type" content="website">
              <style>
                  body { font-family: system-ui, -apple-system, sans-serif; max-width: 850px; margin: 50px auto; padding: 20px; line-height: 1.6; color: #333; }
                  code { background: #f4f4f4; padding: 2px 6px; border-radius: 3px; }
                  pre { background: #f4f4f4; padding: 15px; border-radius: 5px; overflow-x: auto; }
                  .warning { background: #fff3cd; border-left: 4px solid #ffc107; padding: 15px; margin: 20px 0; }
                  .info { background: #d1ecf1; border-left: 4px solid #0c5460; padding: 15px; margin: 20px 0; }
                  h1 { color: #222; } h2 { color: #444; margin-top: 35px; } h3 { color: #555; }
                  table { border-collapse: collapse; width: 100%; margin: 15px 0; }
                  th, td { border: 1px solid #ddd; padding: 8px 12px; text-align: left; }
                  th { background: #f8f8f8; }
                  .badge { display: inline-block; padding: 2px 8px; border-radius: 3px; font-size: 0.85em; font-weight: bold; }
                  .badge-active { background: #d4edda; color: #155724; }
                  .badge-experimental { background: #fff3cd; color: #856404; }
                  .badge-legacy { background: #f8d7da; color: #721c24; }
              </style>
          </head>
          <body>
              <h1>Stremio Debian Repository</h1>

              <p>Unofficial Debian packages for <strong>Stremio</strong> media center. Built from source, following Debian packaging standards.</p>

              <div class="warning">
                  <strong>Unofficial Repository:</strong> These packages are not part of the official Debian archive. Use at your own discretion.
              </div>

              <h2>Available Clients</h2>

              <p>Three Stremio client packages are available. Choose the one that fits your system:</p>

              <table>
                  <tr>
                      <th>Package</th>
                      <th>Toolkit</th>
                      <th>Distributions</th>
                      <th>Architectures</th>
                      <th>Status</th>
                  </tr>
                  <tr>
                      <td><strong>stremio-gtk</strong></td>
                      <td>GTK4 / CEF</td>
                      <td>Debian sid</td>
                      <td>amd64</td>
                      <td><span class="badge badge-active">Recommended</span></td>
                  </tr>
                  <tr>
                      <td><strong>stremio-qt6</strong></td>
                      <td>Qt6 / QtWebEngine</td>
                      <td>Debian trixie, sid; Ubuntu plucky</td>
                      <td>amd64, arm64</td>
                      <td><span class="badge badge-experimental">Experimental</span></td>
                  </tr>
                  <tr>
                      <td><strong>stremio</strong></td>
                      <td>Qt5 / QtWebEngine</td>
                      <td>Debian bookworm, trixie, testing, sid; Ubuntu noble</td>
                      <td>amd64, arm64</td>
                      <td><span class="badge badge-legacy">Legacy (Qt5 EOL)</span></td>
                  </tr>
              </table>

              <p>All clients require <strong>stremio-server</strong> (proprietary, <code>non-free</code> component) for BitTorrent streaming and casting.</p>

              <h2>Quick Installation</h2>

              <h3>Step 1: Add repository GPG key</h3>
              <pre>sudo mkdir -p /etc/apt/keyrings
wget -qO - https://debian.vejeta.com/key.gpg | sudo gpg --dearmor -o /etc/apt/keyrings/stremio-debian.gpg</pre>

              <p>Verify the key fingerprint matches:</p>
              <pre>gpg --show-keys /etc/apt/keyrings/stremio-debian.gpg
# Expected: 2A84 0ED0 0DE6 69F4 219B  8B33 02A7 9E3B 8215 1695</pre>

              <h3>Step 2: Add repository source</h3>

              <p>Choose your distribution:</p>

              <table>
                  <tr><th>Distribution</th><th>Command</th></tr>
                  <tr>
                      <td>Debian testing</td>
                      <td><pre>echo "deb [signed-by=/etc/apt/keyrings/stremio-debian.gpg] https://debian.vejeta.com testing main non-free" | sudo tee /etc/apt/sources.list.d/stremio.list</pre></td>
                  </tr>
                  <tr>
                      <td>Debian trixie (13)</td>
                      <td><pre>echo "deb [signed-by=/etc/apt/keyrings/stremio-debian.gpg] https://debian.vejeta.com trixie main non-free" | sudo tee /etc/apt/sources.list.d/stremio.list</pre></td>
                  </tr>
                  <tr>
                      <td>Debian bookworm (12)</td>
                      <td><pre>echo "deb [signed-by=/etc/apt/keyrings/stremio-debian.gpg] https://debian.vejeta.com bookworm main non-free" | sudo tee /etc/apt/sources.list.d/stremio.list</pre></td>
                  </tr>
                  <tr>
                      <td>Debian sid / Kali</td>
                      <td><pre>echo "deb [signed-by=/etc/apt/keyrings/stremio-debian.gpg] https://debian.vejeta.com sid main non-free" | sudo tee /etc/apt/sources.list.d/stremio.list</pre></td>
                  </tr>
                  <tr>
                      <td>Ubuntu 24.04 (noble)</td>
                      <td><pre>echo "deb [signed-by=/etc/apt/keyrings/stremio-debian.gpg] https://debian.vejeta.com noble main non-free" | sudo tee /etc/apt/sources.list.d/stremio.list</pre></td>
                  </tr>
                  <tr>
                      <td>Ubuntu 25.04 (plucky)</td>
                      <td><pre>echo "deb [signed-by=/etc/apt/keyrings/stremio-debian.gpg] https://debian.vejeta.com plucky main non-free" | sudo tee /etc/apt/sources.list.d/stremio.list</pre></td>
                  </tr>
              </table>

              <h3>Step 3: Install</h3>

              <pre>sudo apt update</pre>

              <p>Then install the client for your system:</p>

              <table>
                  <tr><th>Client</th><th>Install command</th></tr>
                  <tr><td>stremio-gtk (Debian sid)</td><td><code>sudo apt install stremio-gtk stremio-server</code></td></tr>
                  <tr><td>stremio-qt6 (trixie/sid/plucky)</td><td><code>sudo apt install stremio-qt6 stremio-server</code></td></tr>
                  <tr><td>stremio Qt5 (all others)</td><td><code>sudo apt install stremio stremio-server</code></td></tr>
              </table>

              <h2>About the Clients</h2>

              <h3>stremio-gtk (Recommended)</h3>
              <p>Modern GTK4/Adwaita client using CEF (Chromium Embedded Framework). Native Wayland support, follows GNOME HIG. This is the actively developed successor to the Qt5 client. CEF dependencies (libcef147, libcef-common) are installed automatically.</p>

              <h3>stremio-qt6 (Experimental)</h3>
              <p>Experimental Qt6 port for users who prefer KDE/Plasma or Qt-based desktop environments. Provides a non-deprecated Qt client as a workaround while the Qt5 version reaches end-of-life. Can be installed alongside stremio-gtk.</p>

              <h3>stremio (Legacy)</h3>
              <p>Original Qt5/QtWebEngine client. Still functional on bookworm and trixie but will not receive updates once Qt5 is removed from Debian.</p>

              <h2>All Packages</h2>

              <table>
                  <tr><th>Package</th><th>Description</th><th>Component</th><th>Distributions</th></tr>
                  <tr><td><strong>stremio-gtk</strong></td><td>GTK4/CEF Stremio client</td><td>main</td><td>sid</td></tr>
                  <tr><td><strong>stremio-qt6</strong></td><td>Qt6 Stremio client</td><td>main</td><td>trixie, sid, plucky</td></tr>
                  <tr><td><strong>stremio</strong></td><td>Qt5 Stremio client (legacy)</td><td>main</td><td>bookworm, trixie, testing, sid, noble</td></tr>
                  <tr><td><strong>stremio-server</strong></td><td>Streaming server (proprietary)</td><td>non-free</td><td>all</td></tr>
                  <tr><td><strong>libcef147</strong></td><td>CEF runtime library</td><td>main</td><td>sid</td></tr>
                  <tr><td><strong>libcef-common</strong></td><td>CEF resources (locales, PAK files)</td><td>main</td><td>sid</td></tr>
                  <tr><td><strong>libcef-dev</strong></td><td>CEF development headers</td><td>main</td><td>sid</td></tr>
                  <tr><td><strong>librust-cef-dev</strong></td><td>Rust CEF bindings</td><td>main</td><td>sid</td></tr>
                  <tr><td><strong>librust-cef-dll-sys-dev</strong></td><td>Rust CEF FFI bindings</td><td>main</td><td>sid</td></tr>
              </table>

              <h2>Security &amp; Verification</h2>

              <p>All packages are signed with the maintainer's GPG key. The repository metadata (<code>InRelease</code>, <code>Release.gpg</code>) is signed on every deploy.</p>

              <table>
